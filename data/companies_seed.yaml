# PRELUDE curated company universe.
#
# Hand-maintained. Every valuation carries: amount, basis, as_of (when the
# valuation event was reported), and source_url. `basis` values:
#   priced_round    — a closed primary financing at this valuation
#   secondary_sale  — employee/investor share sale at this valuation
#   tender_offer    — company-organized tender at this valuation
#   media_report    — widely reported figure not tied to one closed event
#   public_market   — IPO/listing valuation (for listed status entries)
# Figures reflect the latest publicly reported valuation known at
# curated_as_of; several older last-known rounds are years old — that is the
# honest state of private-market disclosure, and as_of says so.
#
# ipo_status: private | rumored | s1_filed | priced | listed

curated_as_of: 2026-07-15
notes: >-
  Curated universe of late-stage private companies (plus a handful of 2025
  listings kept for status continuity). Factual profiles only; educational
  display. Source URLs point to stable public summaries which themselves
  cite primary reporting.

