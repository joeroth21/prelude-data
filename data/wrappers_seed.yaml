      source_url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0001509470&type=10-K&dateb=&owner=include&count=10
      as_of: "2026-07-14"
    liquidity:
      terms: >-
        Exchange-listed BDC: shares trade intraday on Nasdaq at market
